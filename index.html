<!DOCTYPE html>

    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .bg-grid {
            background-image: radial-gradient(#2B2B2B 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.05;
        }

        .pixel-bg {
            background-image: 
                linear-gradient(45deg, #2B2B2B 2px, transparent 2px),
                linear-gradient(-45deg, #2B2B2B 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.03;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-bounce-slow {
            animation: bounce-slow 3s infinite ease-in-out;
        }

        @keyframes float-continents {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(200px); }
        }

        .continents-animation {
            animation: float-continents 20s linear infinite;
        }

        @keyframes sway {
            0%, 100% { transform: skewX(-3deg) rotate(-1deg); }
            50% { transform: skewX(3deg) rotate(1deg); }
        }

        .animate-sway {
            animation: sway 4s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes drift {
            from { transform: translateX(-10%); }
            to { transform: translateX(10%); }
        }

        .animate-drift {
            animation: drift 10s infinite ease-in-out alternate;
        }

        .sky-gradient {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F2F1 100%);
        }

        @keyframes character-hop {
            0%, 100% { transform: translateX(-20px) translateY(0) rotate(-5deg); }
            50% { transform: translateX(20px) translateY(-40px) rotate(5deg); }
        }

        .animate-character-hop {
            animation: character-hop 3.5s infinite ease-in-out;
        }

        @keyframes flower-sway {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-10px); }
        }

        .animate-flower {
            animation: flower-sway 3s infinite ease-in-out;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 12px 12px 0px 0px #2B2B2B; }
        .modal-shadow { box-shadow: 16px 16px 0px 0px #FFD600; }
        .btn-shadow { box-shadow: 4px 4px 0px 0px #2B2B2B; }
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
    <script>
        tailwind.config = {
            theme: {

                msReconsiderationTitle: "M's Reconsideration", msReconsiderationDesc: "An experimental video project based on an original story about the Internet culture changes the life of the Minotaur.", msReconsiderationDetail: "The concept of the Internet meme is a complex and highly informative idea, often understood as a “joke in a small circle”, where the content does not seek to please everyone who reads it. And this new virtual concept on the Internet has brought many real-life consequences to our world. By thinking about real-life cases, I decided to create a short fantasy film featuring a meme victim - a not-exactly-evil minotaur monster who is betrayed by society, questioning moral justice under these hidden internet rules.",
                rusticOnesTitle: "Rustic Ones", rusticOnesDesc: "An Esugoroku-like board game collection exploring the defination of rustic fashion styles and how it affect us throughout the time.", rusticOnesDetail: "A sense of shame often accompanies the concept of rustic or outdated in lots of countries’ linguistic system; this mood is born from the information gap between different people from different social classes. When thinking deeply about the definition of rustic objects that are knocked out by time, it always leads to a question of when this way of thinking was first formed in history. The opposite of rustic things, which might be considered fashion, is also difficult to define even recently there have been interpretations that if you accomplished rustic to the extreme, it would become trendy. To discuss this issue in depth, I designed an Esugoroku-like(絵双六) board game named Rustic Ones to make the players think about the historical causes and psychological factors of rustic and fashion.",
                pixelsCantBeatPaintTitle: "Pixels Can't Beat Paint", pixelsCantBeatPaintDesc: "A interdisciplinary collaborative project in RCA, AcrossRCA 2026.", pixelsCantBeatPaintDetail: "‘Pixels can't beat Paint' is the title of our zine that is a continued investigation of the \"In Defense of the Poor Image\" and circulations, inspired by the research of Hito Steyerl. This concept is explored through a tactile experimentation of repeatedly and iteratively photographing an image until the image is rendered ultimately unrecognizable from the original. The iterative process is documented in the form of an artist's book. This work is an analogy of rumors, fake news, and misinformation in cyberspace. The loss of authenticity as a result of information overload and the lack of context in the fast-paced short attention-span digital cultural landscape. By choosing the present our final process in an artist's book, we contrast the impermanence of image with the tactile presence of a physical object. AcrossRCA 2026, Pixels can't beat Paint website: https://spaces.rca.ac.uk/acrossrca2026/projects/pixels-cant-beat-paint/",
                undetectedWatchTitle: "Undetected Watch", undetectedWatchDesc: "An experimental project exploring surveillance and the concept of the 'unseen' through visual elements.", undetectedWatchDetail: "The eyes of surveillance are everywhere in the modern world, and others inadvertently spy on people's daily routines. Is this a blessing or a danger to mankind? combined digital painting and pixel art techniques to create this series of works, trying to make the viewer think about the impact of surveillance in protecting our security while at the same time bringing privacy exposure and other effects to the public. Electronic cameras become an important part of our society, and through camera surveillance, people can track crime and record evidence. However, many people have an unbalanced feeling about being watched as a form of protection and a lack of privacy from unconscious voyeurism. The camera's recordings are mechanical, it is constantly storing the things going around as witnessed from 'its' point of view. But without people's interpretation, those records are only cold and pixelated reproductions of a past perspective. Surveillance is inherently characterized as a God's point of view, and its unnoticeable existence reinforces its humanly uncomfortable properties. I want to think about the humanistic inclusiveness of this imperceptible surveillance by visualizing it. The aptly named 'Skynet' is a mass surveillance system in China that echoes the cameras that hang in the sky above the streets. Every move you make is inadvertently watched and recorded as evidence of some kind. Its existence eases the burden of crime detection and becomes a tool of justice. Meanwhile unable to do anything without being watched, even for the sake of justice, is still a potential invasion of privacy. Countless clips of people on the street accidentally falling, or secret body parts you don’t want to explore to the public, have been misused and posted on the internet by those camera holders to date. I wanted to use a combination of paintings and photographs to represent the sense of uncomfortable caused by the hidden gaze from the social surveillance camera. To warn the viewers that even the original purpose of this surveillance system was intending to protect security, but the outcome leads to our unfreedom words and actions.",
                entomophobiaIssuesTitle: "The Entomophobia Issues", entomophobiaIssuesDesc: "An illustration series exploring the fear of insects through surrealistic and vibrant visual storytelling.", entomophobiaIssuesDetail: "Bug phobia is more likely to occur in the population as compared to deep-sea phobia or claustrophobia. And I'm one of those people, I don't know when I started, but the sight of a bug that suddenly appears always scares me to jump or even scream. I created four story records analyzing stories about my relationship with entomophobia, confronting my own fearfulness in an attempt to explore its roots. Insect phobias can be either congenital or acquired, and their sub-branches are numerous and complex, such as arachnophobia, cockroach phobia, and so on. I myself am an acquired flying insect phobic, and the four chapters in my point of view are an account of the four causes of this fear. Fear kills bugs： The first story describes how I'm afraid of the way bugs die, so even though humans have a big size advantage over bugs I have trouble laying my hands on bugs to kill them. However, I do question from time to time if this is a hypocrisy, as humans inadvertently trample many bugs to death every day with their daily walks. Fear of Bugs Uncertainty： This story shows the cause of most flying insect phobics - bugs are unpredictable and this lack of socialization constraints often creates fear. A bug's brain is so much smaller compared to other animals like dogs and cats, which adds to the fear of whether it will suddenly make a decision like jumping on you. But it has always been human beings who aspire for freedom but feel threatened by the free behavior of other creatures. Fear of bug-ridden places： Most bugs are extremely fertile to make up for their lack of strength and size, and their reproduction often occurs in places that humans find filthy, such as rotting fruit and unclean bathrooms. This gives flies and cockroaches an inherently unwelcome element to these creatures. Dirty places and overpopulated bugs are considered distasteful by the average person. Fear of man's relationship with nature： The fourth story combines my real-life experience of living alone in Japan in 2023, when tsubaki worms appeared in autumn 80 times more than in previous years. These bugs, which like to fly towards light sources and emit a foul odour, had a considerable impact on urbanites and made me, living alone, feel terrified to switch on the lights every night. But after creating a study on the phototropism of bugs, I learnt that the phototropism of bugs began before people used lighting tools, and they flew in the direction of the moonlight as a coordinate system to judge the direction. The popularity of lighting has confused this natural system, creating countless moths and people who don't understand the wild flight of flying insects. After being exposed to printing and cutting various types of fabrics, I made an additional doll to represent the relationship between humans and bugs coexisting in the world. The silhouettes of bugs and humans intersect, and even though we fear each other we live together in the world. Throughout the creation, I studied many photographs of bugs and seemed to cure some of the fear of what insects look like, but still couldn't accept the shock of their sudden appearance in the corner.",
                huntedTalesTitle: "Hunted Tales of White City", huntedTalesDesc: "An experimental narrative project exploring the hidden stories and urban legends of White City.", huntedTalesDetail: "This is an experimental film created to mark the one-year anniversary of the relocation of the RCA's White City campus by crafting a short series urban legend tales about the site.",
                rainbowLimboParkTitle: "Rainbow Limbo Park", rainbowLimboParkDesc: "An original comic series exploring surreal characters in a colorful theme park.", rainbowLimboParkDetail: "Rainbow Limbo Park is an ongoing comic that tells a story of a young demon Buro comes to join his cousin Bu, who runs Rainbow Limbo Park, an amusement park in Limbo Hell, and is forced to dress up in a strange pink mascot kangaroo costume to earn some extra money for a year of working with his strange uncle. Buro, dressed in a strange mascot suit, becomes the target of a pair of young siblings who are being teased. But they are actually spirits wandering around Limbo Hell, the souls of children who were chosen too soon to die in battle as warriors. Uncle Bu responded to the wishes of their former sister Nana by creating this paradise for them, waiting for a chance to be immortalized or to avenge their deaths.",
                atTheWatersEdgeTitle: "At the Water's Edge", atTheWatersEdgeDesc: "Group theater project exploring boundaries between nature and urban spaces.", atTheWatersEdgeDetail: "With a keen eye for detail, I have actively contributed to the Maryland Institute College of Art 2019 annual play At the Water's Edge, where I played a role as the stage and prop designer. This play showcases a dynamic performance piece—with visual, movement, music, language, film, and architectural elements; it emerges from Shakespeare's Tempest as the human and other-than-human world encounters climate change in Baltimore and beyond. The Play is the Thing team Instagram page: https://www.instagram.com/thewater.edge/",
                renaissanceBetween0to1Title: "Renaissance Between 0 to 1", renaissanceBetween0to1Desc: "Digital illustrations exploring digital rebirth.", renaissanceBetween0to1Detail: "The Renaissance, spanning the 14th to 16th centuries, birthed humanistic ideals in Europe. Today's digital era is facing a contradiction between humanism and technical progress. This paradox highlights the interplay of modernity and industry. I've crafted a collage blending Renaissance art with digital elements, each symbolizing a related alphabet. This fusion invites reflection on tradition versus innovation and asks the audience to consider the testament to humanism's relevance amidst technological advancement.",
                musicPopOsakaTitle: "Music POP Osaka", musicPopOsakaDesc: "Exploring the music scene and pop culture in Osaka.", musicPopOsakaDetail: "Japan is a prominent Asian country where pop culture thrives, particularly in Osaka, the bustling heart of the Kansai region, exuding a distinct vitality unlike anywhere else in the country. Lots of artists fervently delve into subcultures and embrace internationalization. During a year and a half of cultural study here, I had a great chance to collaborate with local bands and live houses, where I made a series of Pop music-themed designs. This creative journey allowed me to know better about the community of Japanese youth these days, witnessing their resistance against societal pressures and prejudices.\n\n(told about) Bored Games Instagram page: https://www.instagram.com/toldaboutboredgames/"

                photoHuntTitle: "Photo Hunt Workshop (摄影寻宝工作坊)", photoHuntDesc: "与中学生一起探索摄影的创意小组合作工作坊。", photoHuntDetail: "Photo Hunt Workshop (摄影寻宝工作坊) 是 2026 年英国皇家艺术学院 (RCA) 传播学院内的一个小组合作项目。我们的小组邀请了来自凤凰高中 (Phoenix High School) 的学生访问我们的工作室，并探索体验不同类型摄影机的可能性。工作坊重点向年轻一代介绍构图和叙事构建的概念。",
                msReconsiderationTitle: "M's Reconsideration (M的重新审视)", msReconsiderationDesc: "讲述了互联网文化如何改变了米诺陶洛斯的生活。", msReconsiderationDetail: "互联网迷因（Meme）的概念是一个复杂且信息量巨大的想法，通常被理解为“小圈子里的笑话”，其内容并不追求取悦每一个阅读它的人。而互联网上这种全新的虚拟概念为我们的现实世界带来了许多后果。通过思考现实生活中的案例，我决定制作一部短篇奇幻电影，主角是一个迷因受害者的米诺陶洛斯怪物——他并非完全邪恶，却被社会背叛，以此质疑这些隐藏的互联网规则下的道德正义。",
                rusticOnesTitle: "Rustic Ones", rusticOnesDesc: "一个类绘双六（Esugoroku）棋盘游戏系列，探索乡村时尚风格的定义以及它如何随着时间的推移影响我们。", rusticOnesDetail: "在许多国家的语言体系中，“土气”或“过时”的概念往往伴随着一种羞耻感；这种情绪源于不同社会阶层之间的人们的信息差。当深入思考那些被时代淘汰的“土气”物品的定义时，总会引出一个问题：这种思维方式最初是在历史的什么时候形成的。“土气”的反面可能被视为“时尚”，但“时尚”也很难定义，即使最近有人解读说，如果你把“土气”做到极致，它就会变成“时髦”。为了深入讨论这个问题，我设计了一个名为《Rustic Ones》的类绘双六（Esugoroku）棋盘游戏，旨在让玩家思考“土气”与“时尚”的历史原因和心理因素。",
                pixelsCantBeatPaintTitle: "Pixels Can't Beat Paint", pixelsCantBeatPaintDesc: "英国皇家艺术学院（RCA）的跨学科合作项目。", pixelsCantBeatPaintDetail: "‘Pixels can't beat Paint’（像素无法击败绘画）是我们制作的一本 zine 的标题，它是对 Hito Steyerl 有关“保卫贫穷图像”（In Defense of the Poor Image）及图像传播研究的持续探索。我们通过一种触觉实验来体现这一概念：反复迭代地拍摄同一张图像，直到它最终变得与原始图像完全无法辨认。这一迭代过程被记录在了一本艺术家书籍中。这部作品是对网络空间中谣言、虚假新闻和误导信息的隐喻，探讨了在信息过载和短注意力机制的数字文化景观中，由于语境缺失而导致的真实性丧失。通过选择以艺术家书籍的形式呈现最终过程，我们将图像的瞬时性与物理对象的触感存在进行了对比。AcrossRCA 2026, Pixels can't beat Paint 项目网站：https://spaces.rca.ac.uk/acrossrca2026/projects/pixels-cant-beat-paint/",
                undetectedWatchTitle: "Undetected Watch", undetectedWatchDesc: "通过视觉元素探索监控与“未见之物”概念的实验性项目。", undetectedWatchDetail: "监控之眼在现代世界无处不在，他人在不经意间窥探着人们的日常生活。这究竟是对人类的祝福还是危险？我结合了数字绘画和像素艺术技巧创作了这一系列作品，试图让观众思考监控在保护我们安全的同时，给公众带来的隐私暴露和其他影响。电子摄像头已成为我们社会的重要组成部分，通过摄像头监控，人们可以追踪犯罪并记录证据。然而，许多人对于被监视作为一种保护形式与无意识窥探导致的隐私缺失感到心理失衡。摄像头的记录是机械的，它不断地从‘它’的视角存储周围发生的事情。但如果没有人的解读，这些记录仅仅是过去视角的冷冰冰且像素化的复制。监控本质上具有‘上帝视角’的特征，其难以察觉的存在强化了令人感到不适的属性。我想通过视觉化的方式来探讨这种难以察觉的监控所具有的人文包容性。中国的大规模监控系统‘天网’（Skynet）的名字非常贴切，它呼应了悬挂在街道上方天空中的摄像头。你的每一个举动都在不经意间被注视并记录为某种证据。它的存在减轻了侦破犯罪的负担，并成为正义的工具。与此同时，即使是为了正义，在无法摆脱被监视的情况下做任何事，仍然是对隐私的潜在侵犯。到目前为止，由于摄像头持有者的滥用，无数街上人们意外摔倒的视频，或者你不想向公众展示的私密身体部位，都被发布在互联网上。我希望通过绘画和照片的结合，来表现社会监控摄像头隐藏的注视所带来的不适感。旨在提醒观众，即使这种监控系统的初衷是为了保护安全，但其结果却导致了我们言行上的不自由。",
                entomophobiaIssuesTitle: "The Entomophobia Issues", entomophobiaIssuesDesc: "一个通过超现实且鲜明的视觉叙事来探索昆虫恐惧的插画系列。", entomophobiaIssuesDetail: "昆虫恐惧症在人群中发生的概率比深海恐惧症或幽闭恐惧症更高。我就是其中之一，不知道从什么时候开始，突然出现的昆虫总会让吓得我跳起来甚至大叫。我创作了四个故事记录，分析了我与昆虫恐惧症之间的故事，直面自己的恐惧，试图探索其根源。昆虫恐惧症可以是先天的也可以是后天习得的，其分支众多且复杂，如蜘蛛恐惧症、蟑螂恐惧症等。我本人是一名后天习得的飞行昆虫恐惧症患者，作品中的四个章节从我的视角阐述了这种恐惧的四个起因：‘恐惧杀戮昆虫’：第一个故事描述了我如何害怕昆虫死亡的方式，所以即使人类在体型上占绝对优势，我也很难下手杀掉它们。然而，我不时会反思这是否是一种伪善，因为人类每天在行走中都会无意中踩死许多昆虫。‘对昆虫不确定性的恐惧’：这个故事展示了大多数飞行昆虫恐惧症的原因——昆虫是不可预测的，这种缺乏社会化约束的行为往往会产生恐惧。与狗、猫等动物相比，昆虫的大脑要小得多，这增加了人们对它是否会突然跳到你身上这种行为的恐惧。但一直以来，向往自由的人类却往往感到受到其他生物自由行为的威胁。‘对昆虫聚集地的恐惧’：大多数昆虫的繁殖力极强，以弥补力量和体型的不足，它们的繁殖往往发生在人类认为肮脏的地方，如腐烂的水果和不干净的浴室。这给苍蝇和蟑螂等生物带来了一种固有的不受欢迎的因素。肮脏的地方和数量过剩的昆虫会被普通人视为厌恶项。‘对人与自然关系的恐惧’：第四个故事结合了我 2023 年独自在日本生活的真实经历，当时秋季出现的椿象（tsubaki worms）比往年多出 80 倍。这些喜欢飞向光源并散发出恶臭的昆虫对城市生活产生了相当大的影响，也让我这个独自生活的人每天晚上都不敢开灯。但在对昆虫趋光性进行研究后，我了解到昆虫的趋光性在人类使用照明工具之前就开始了，它们以月光的方向作为坐标系来判断方向。照明的普及混淆了这一自然系统，造成了无数飞蛾扑火，也让人们无法理解昆虫的狂乱飞行。在接触过各种类型面料的印刷和裁剪后，我制作了一个额外的玩偶，以此代表人类与昆虫在这个世界上共存的关系。昆虫和人类的轮廓交织在一起，尽管我们彼此畏惧，但我们共同生活在这个世界上。在整个创作过程中，我研究了许多昆虫的照片，似乎治愈了一些对昆虫长相的恐惧，但仍然无法接受它们突然出现在角落里的震撼。",
                huntedTalesTitle: "Hunted Tales of White City", huntedTalesDesc: "一个探索白城（White City）隐藏故事和都市传说的实验性叙事项目。", huntedTalesDetail: "这是一部为纪念英国皇家艺术学院 (RCA) 白城校区搬迁一周年而创作的实验电影，通过创作一系列关于该地点的都市传说短篇故事而成。",
                rainbowLimboParkTitle: "Rainbow Limbo Park", rainbowLimboParkDesc: "一个在彩色主题公园中探索超现实角色的原创漫画系列。", rainbowLimboParkDetail: "Rainbow Limbo Park 是一部正在连载的漫画，讲述了年轻恶魔 Buro 来投靠他在地狱边境经营游乐场 Rainbow Limbo Park 的表哥 Bu，并被迫穿上奇怪的粉色袋鼠吉祥物套装，为他奇怪的舅舅工作一年以赚取外快的故事。穿着奇怪吉祥物服装的 Buro 成了一对被捉弄的小兄妹的目标。但他们实际上是在地狱边境游荡的幽灵，是那些过早被选中作为战士在战斗中牺牲的孩子们的灵魂。舅舅 Bu 响应了他们之前的姐姐 Nana 的愿望，为他们创造了这个天堂，等待着获得永生或为他们的死亡复仇的机会。",
                atTheWatersEdgeTitle: "At the Water's Edge", atTheWatersEdgeDesc: "探索自然与城市空间边界的小组戏剧项目。", atTheWatersEdgeDetail: "我凭借敏锐的细节洞察力，积极参与了马里兰艺术学院 (MICA) 2019 年的年度剧目《At the Water's Edge》，并担任舞台和道具设计师。该剧展示了一个充满活力的表演作品——结合了视觉、运动、音乐、语言、电影和建筑元素；它源于莎士比亚的《暴风雨》，探讨了人类与非人类世界在巴尔的摩及其他地区遭遇气候变化的情境。'The Play is the Thing' 团队 Instagram 页面：https://www.instagram.com/thewater.edge/",
                renaissanceBetween0to1Title: "Renaissance Between 0 to 1", renaissanceBetween0to1Desc: "探索数字重生和像素美学的数字插画系列。", renaissanceBetween0to1Detail: "文艺复兴跨越 14 至 16 世纪，在欧洲孕育了人文主义理想。如今的数字时代正面临着人文主义与技术进步之间的矛盾。这一悖论凸显了现代性与工业之间的相互作用。我创作了一幅将文艺复兴艺术与数字元素相结合的拼贴画，每个元素都象征着一个相关的字母。这种融合引发了对传统与创新的反思，并邀请观众在技术进步的过程中思考人文主义相关性的见证。",
                musicPopOsakaTitle: "Music POP Osaka", musicPopOsakaDesc: "一个探索大阪音乐场景和流行文化的合作项目。", musicPopOsakaDetail: "日本是一个流行文化盛行的亚洲大国，特别是在大阪——关西地区繁华的核心地带，散发着该国其他地方所没有的独特活力。许多艺术家热衷于钻研亚文化并拥抱国际化。在这一年半的文化研究期间，我有幸与当地乐队和 Live House 合作，创作了一系列以流行音乐为主题的设计。这段创意之旅让我更好地了解了当今日本年轻人的群体，见证了他们对社会压力和偏见的反抗。\n\n(told about) Bored Games Instagram 页面：https://www.instagram.com/toldaboutboredgames/"
            },
            jp: {
                photoHuntTitle: "Photo Hunt Workshop", photoHuntDesc: "中学生を対象に写真撮影を探求するクリエイティブな共同グループ・ワークショップ。", photoHuntDetail: "Photo Hunt Workshopは、2026年にロイヤル・カレッジ・オブ・アート（RCA）のコミュニケーション・スクール内で行われた共同グループプロジェクトです。私たちのグループは、フェニックス高校の生徒をスタジオに招き、様々な種類のカメラを体験する可能性を探求しました。このワークショップは、若い世代に構図や物語構築の概念を紹介することに焦点を当てました。",
                msReconsiderationTitle: "M's Reconsideration", msReconsiderationDesc: "インターネット文化がミノタウロスの生活を変えるというオリジナルストーリーに基づいた実験的なビデオプロジェクト。", msReconsiderationDetail: "インターネット・ミームの概念は複雑で情報量の多いアイデアであり、多くの場合「小さなサークルの中のジョーク」として理解され、その内容は読む人全員を喜ばせようとするものではありません。そして、インターネット上のこの新しい仮想的な概念は、私たちの世界に多くの現実的な影響をもたらしました。実生活の事例を考えることで、ミームの犠牲者である、社会に裏切られたそれほど邪悪ではないミノタウロスの怪物を主役にした短編ファンタジー映画を制作し、これらの隠されたインターネットのルールの下での道徳的正義を問うことにしました。",
                rusticOnesTitle: "Rustic Ones", rusticOnesDesc: "「土気（ラスティック）」なファッションスタイルの定義と、それが時代とともにどのように私たちに影響を与えるかを探求する、絵双六のようなボードゲームコレクション。", rusticOnesDetail: "多くの国の言語体系において、「土気」や「時代遅れ」という概念にはしばしば恥の感覚が伴います。この気分は、異なる社会階層の人々の間の情報格差から生まれます。時代に淘汰された土気なオブジェクトの定義について深く考えると、この考え方が歴史上のいつ形成されたのかという問いに必ず行き着きます。ファッションとみなされるかもしれない土気なものとは対照的なものも定義が難しく、最近では土気を極めればトレンドになるという解釈さえあります。この問題を深く議論するために、私はRustic Onesという絵双六形式のボードゲームをデザインし、プレイヤーに土気とファッションの歴史的原因と心理的要因について考えてもらうようにしました。",
                pixelsCantBeatPaintTitle: "Pixels Can't Beat Paint", pixelsCantBeatPaintDesc: "RCAのAcrossRCA 2026における学際的な共同プロジェクト。", pixelsCantBeatPaintDetail: "「Pixels can't beat Paint（ピクセルは絵画に勝てない）」は、ヒト・シュタイエルの研究に触発された「貧しい画像への擁護」と循環の継続的な調査である私たちのZineのタイトルです。このコンセプトは、元の画像から究極的に認識できなくなるまで画像を繰り返し反復的に撮影するという触覚的な実験を通じて探求されます。その反復プロセスはアーティストブックの形式で記録されています。この作品は、サイバースペースにおける噂、フェイクニュース、誤報のメタファーです。情報過多と、ペースの速い短い注意力のデジタル文化の風景における文脈の欠如の結果としての信憑性の喪失。最終的なプロセスをアーティストブックで表現することを選択することで、画像の無常性と物理的なオブジェクトの触覚的な存在感を対比させています。AcrossRCA 2026, Pixels can't beat Paint ウェブサイト: https://spaces.rca.ac.uk/acrossrca2026/projects/pixels-cant-beat-paint/",
                undetectedWatchTitle: "Undetected Watch", undetectedWatchDesc: "視覚的要素を通じて監視と「見えないもの」の概念を探求する実験的なプロジェクト。", undetectedWatchDetail: "監視の目は現代世界のいたるところにあり、他人が不注意にも人々の日常生活を覗き見ています。これは人類にとっての祝福でしょうか、それとも危険でしょうか？デジタルペインティングとピクセルアートの技法を組み合わせてこの一連の作品を制作し、監視が私たちの安全を守る上での影響を視聴者に考えてもらうと同時に、プライバシーの露出やその他の影響を公衆にもたらすことを試みました。電子カメラは私たちの社会の重要な一部となり、カメラ監視を通じて人々は犯罪を追跡し、証拠を記録することができます。しかし、多くの人が、保護の形態として監視されることと、無意識ののぞき見によるプライバシーの欠如について、不均衡な感情を抱いています。カメラの記録は機械的であり、「それ」の視点から目撃された周囲の出来事を絶えず保存しています。しかし、人々の解釈がなければ、それらの記録は過去の視点の冷たくピクセル化された再現にすぎません。監視は本質的に「神の視点」として特徴づけられ、その気づかれない存在が人間としての不快な特性を強化しています。私はこの知覚できない監視を視覚化することで、その人間主義的な包容性について考えたいと思います。適切にも「スカイネット」と名付けられたのは、街の上の空にぶら下がっているカメラを反映した中国の大規模な監視システムです。あなたのあらゆる動きは不注意にも監視され、何らかの証拠として記録されています。その存在は犯罪捜査の負担を軽減し、正義の道具となります。一方で、正義のためであっても、監視されることなく何もできないということは、依然としてプライバシーの潜在的な侵害です。路上で誤って転んだ人々の無数の映像や、公衆にさらしたくない秘密の身体部位が、今日までこれらのカメラ保持者によって悪用され、インターネットに投稿されてきました。私は絵画と写真を組み合わせて、社会的監視カメラからの隠れた視線による不快感を表現したいと考えました。この監視システムの本来の目的は安全を保護することであったとしても、その結果が私たちの言葉や行動の不自由につながることを視聴者に警告するためです。",
                entomophobiaIssuesTitle: "The Entomophobia Issues", entomophobiaIssuesDesc: "シュールで鮮やかな視覚的ストーリーテリングを通じて昆虫への恐怖を探求するイラストシリーズ。", entomophobiaIssuesDetail: "昆虫恐怖症は、深海恐怖症や閉所恐怖症と比較して、人口の中で発生する可能性が高いです。私もその一人で、いつから始まったのかは分かりませんが、突然現れる虫の姿を見るといつも驚いて飛び上がったり、悲鳴を上げたりしてしまいます。私は、昆虫恐怖症との関係についての物語を分析し、その根源を探るために自分自身の恐怖に向き合った4つのストーリー・レコードを作成しました。昆虫恐怖症は先天的または後天的のいずれかであり、その細分化された枝はクモ恐怖症、ゴキブリ恐怖症など、数多く複雑です。私自身は後天的な飛行昆虫恐怖症であり、私の視点による4つの章は、この恐怖の4つの原因についての説明です。「恐怖が虫を殺す」：最初の物語は、虫が死ぬ様子がいかに怖いかを書いています。そのため、人間は虫に対して大きな体格差があるにもかかわらず、虫を殺すために手を下すのが困難です。しかし、人間が毎日の散歩で不注意にも多くの虫を踏み殺していることを考えると、これは偽善ではないかと時々疑問に思います。「虫の不確実性への恐怖」：この物語は、ほとんどの飛行昆虫恐怖症の原因を示しています。虫は予測不可能であり、この社会化の制約の欠如がしばしば恐怖を生み出します。虫の脳は犬や猫のような他の動物と比べてはるかに小さく、それが突然あなたに飛び乗るような決断を下すのではないかという恐怖に拍車をかけます。しかし、常に自由を熱望しながら他の生き物の自由な行動に脅威を感じるのは人間です。「虫だらけの場所への恐怖」：ほとんどの虫は、強さや大きさの不足を補うために非常に繁殖力が高く、その繁殖は腐った果物や不潔なバスルームなど、人間が不潔だと感じる場所でしばしば起こります。これがハエやゴキブリに、これらの生き物に対する本質的に歓迎されない要素を与えています。不潔な場所と過剰繁殖した虫は、平均的な人から嫌悪感を抱かれると考えられています。「人間の自然との関係への恐怖」：4番目の物語は、2023年に日本で一人暮らしをしていた際、秋に椿虫が前年比80倍も発生した実体験を組み合わせています。光源に向かって飛ぶのを好み、悪臭を放つこれらの虫は都市生活者に相当な影響を与え、一人暮らしの私に毎晩明かりを点けるのを恐ろしく思わせました。しかし、虫の趨光性についての研究を作成した後、虫の趨光性は人々が照明器具を使う前から始まっており、彼らは方向を判断するための座標系として月光の方向に飛んでいたことを知りました。照明の普及はこの自然なシステムを混乱させ、無数の蛾と、飛行昆虫の荒れ狂う飛行を理解できない人々を生み出しました。様々な種類の生地のプリントやカットを経験した後、世界で共存する人間と虫の関係を表現するために追加の人形を制作しました。虫と人間のシルエットが交差し、お互いに恐れながらも、私たちは世界で共に生きています。創作を通じて多くの虫の写真を研究し、虫がどのような姿をしているかという恐怖をいくらか克服したように見えましたが、それでも隅に突然現れる衝撃は受け入れられませんでした。",
                huntedTalesTitle: "Hunted Tales of White City", huntedTalesDesc: "ホワイトシティの隠された物語や都市伝説を探求する実験的なナラティブ・プロジェクト。", huntedTalesDetail: "これは、RCAのホワイトシティ・キャンパス移転1周年を記念して制作された実験映画であり、その場所に関する一連の短い都市伝説の物語を作り上げたものです。",
                rainbowLimboParkTitle: "Rainbow Limbo Park", rainbowLimboParkDesc: "カラフルなテーマパークで超現実的なキャラクターを探求するオリジナル漫画シリーズ。", rainbowLimboParkDetail: "Rainbow Limbo Parkは、若い悪魔のブロが、地獄の辺境（リンボ・ヘル）で遊園地「レインボー・リンボ・パーク」を経営しているいとこのブの手伝いをするためにやってきて、奇妙な叔父の下で1年間働いて小遣いを稼ぐために、奇妙なピンク色のマスコット・カンガルーの衣装を着せられるという物語を描いた、現在連載中の漫画です。奇妙なマスコットスーツを着たブロは、からかわれている若い兄妹の標的になります。しかし、彼らは実際にはリンボ・ヘルの周りを彷徨う霊であり、戦士として戦いで死ぬためにあまりにも早く選ばれた子供たちの魂です。叔父のブは、彼らの以前の姉であるナナの願いに応え、彼らが不滅になるチャンスや死の復讐を待つためのパラダイスを彼らのために作りました。",
                atTheWatersEdgeTitle: "At the Water's Edge", atTheWatersEdgeDesc: "自然と都市空間の境界を探求するグループ演劇プロジェクト。", atTheWatersEdgeDetail: "細部への鋭いこだわりを持って、私はメリーランド・インスティテュート・カレッジ・オブ・アート（MICA）の2019年年次劇『At the Water's Edge』に積極的に貢献し、ステージおよび小道具デザイナーとしての役割を果たしました。この劇は、視覚、動き、音楽、言語、映画、建築の要素を備えたダイナミックなパフォーマンス作品を披露しています。シェイクスピアの『テンペスト』から生まれ、人間および人間以外の世界がボルチモアやその他の場所で気候変動に遭遇する様子を描いています。「The Play is the Thing」チームのInstagramページ: https://www.instagram.com/thewater.edge/",
                renaissanceBetween0to1Title: "Renaissance Between 0 to 1", renaissanceBetween0to1Desc: "デジタルの再生を探求するデジタルイラストレーション。", renaissanceBetween0to1Detail: "14世紀から16世紀にかけてのルネサンスは、ヨーロッパで人間主義的な理想を誕生させました。今日のデジタル時代は、人間主義と技術的進歩の間の矛盾に直面しています。このパラドックスは、現代性と産業の相互作用を浮き彫りにしています。私はルネサンス美術とデジタル要素を融合させたコラージュを制作し、それぞれが関連するアルファベットを象徴しています。この融合は伝統対革新への反省を促し、技術の進歩の中で人間主義の関連性の証を検討するよう観客に求めています。",
                musicPopOsakaTitle: "Music POP Osaka", musicPopOsakaDesc: "大阪の音楽シーンとポップカルチャーを探求。", musicPopOsakaDetail: "日本はポップカルチャーが繁栄しているアジアの主要国であり、特に活気ある関西地方の中心である大阪は、国内の他の場所とは異なる独特の活気に満ちています。多くのアーティストが熱心にサブカルチャーを掘り下げ、国際化を受け入れています。ここでの1年半の文化研究の間に、地元のバンドやライブハウスと協力する素晴らしい機会があり、そこで一連のポップミュージックをテーマにしたデザインを制作しました。このクリエイティブな旅を通じて、最近の日本の若者のコミュニティについてより深く知ることができ、社会的な圧力や偏見に対する彼らの抵抗を目撃しました。\n\n(told about) Bored Games Instagramページ: https://www.instagram.com/toldaboutboredgames/"
            }
        };

        let currentLang = 'en';
        let currentFilter = 'All';
        let selectedProject = null;
        let currentImageIndex = 0;

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[id^="lang-"]').forEach(btn => btn.classList.remove('bg-pop-purple', 'text-white'));
            document.getElementById('lang-' + lang).classList.add('bg-pop-purple', 'text-white');
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                const keys = key.split('.');
                let val = t;
                keys.forEach(k => val = val[k]);
                el.innerText = val;
            });
            const filterContainer = document.getElementById('project-filters');
            const pt = t.projects;
            const filters = [ { t: 'All', l: pt.filterAll }, { t: 'Illustrations', l: pt.filterUI }, { t: 'Experimental', l: pt.filterBranding }, { t: 'Collaborations', l: pt.filterWeb } ];
            filterContainer.innerHTML = filters.map(f => `
                <button onclick="setFilter('${f.t}')" class="px-6 py-3 text-sm font-bold transition-all rounded-2xl border-4 ${currentFilter === f.t ? 'bg-pop-purple text-white border-ink shadow-[4px_4px_0px_0px_#2B2B2B]' : 'bg-white text-ink border-ink/10 hover:border-ink shadow-[4px_4px_0px_0px_transparent] hover:shadow-[4px_4px_0px_0px_#2B2B2B]'}">${f.l}</button>
            `).join('');
            renderProjects();
        }

        function setFilter(f) { currentFilter = f; updateUI(); }

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            const filtered = projectsData.filter(p => currentFilter === 'All' || p.category.includes(currentFilter));
            grid.innerHTML = filtered.map((p, i) => {
                const pj = i18nProjects[currentLang];
                return `
                <div class="group cursor-pointer" onclick="openModal(${p.id})">
                    <div class="relative overflow-hidden aspect-square rounded-[2.5rem] mb-6 border-4 border-ink shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] transition-all group-hover:shadow-none group-hover:translate-x-2 group-hover:translate-y-2 ${i % 3 === 0 ? 'bg-pop-pink' : i % 3 === 1 ? 'bg-pop-yellow' : 'bg-pop-green'}">
                        <img src="${p.image}" class="w-full h-full object-cover p-4 rounded-[3rem]">
                        <div class="absolute top-6 right-6 w-12 h-12 bg-white rounded-full border-4 border-ink flex items-center justify-center font-bold text-lg shadow-lg">★</div>
                    </div>
                    <div class="space-y-2 px-2">
                        <p class="text-xs uppercase tracking-widest font-black opacity-60">${p.category}</p>
                        <h3 class="text-2xl font-black">${pj[p.langKey + 'Title']}</h3>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(id) {
            selectedProject = projectsData.find(p => p.id === id);
            currentImageIndex = 0;
            const pj = i18nProjects[currentLang];
            document.getElementById('modal-title').innerText = pj[selectedProject.langKey + 'Title'];
            document.getElementById('modal-category').innerText = selectedProject.category;
            document.getElementById('modal-description').innerText = pj[selectedProject.langKey + 'Desc'];
            document.getElementById('modal-detail').innerText = pj[selectedProject.langKey + 'Detail'];
            document.getElementById('modal-media').innerHTML = selectedProject.videoUrl 
                ? `<iframe src="${getEmbedUrl(selectedProject.videoUrl)}" class="w-full h-full" allowfullscreen></iframe>`
                : `<img src="${selectedProject.image}" class="w-full h-full object-cover">`;
            const gal = document.getElementById('gallery-container');
            if (selectedProject.images) { gal.classList.remove('hidden'); updateGallery(); } else { gal.classList.add('hidden'); }
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.body.classList.remove('overflow-hidden'); document.getElementById('modal-media').innerHTML = ''; }
        function getEmbedUrl(u) { const m = u.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return m ? `https://www.youtube.com/embed/${m[2]}` : u; }
        function updateGallery() { document.getElementById('gallery-main').src = selectedProject.images[currentImageIndex]; }
        function nextGalleryImage() { currentImageIndex = (currentImageIndex + 1) % selectedProject.images.length; updateGallery(); }
        function prevGalleryImage() { currentImageIndex = (currentImageIndex - 1 + selectedProject.images.length) % selectedProject.images.length; updateGallery(); }
        
        async function copyEmail(event) {
            event.preventDefault();
            const email = "denariousco@gmail.com";
            try {
                await navigator.clipboard.writeText(email);
                const span = event.currentTarget.querySelector('span:last-child');
                const originalText = span.innerText;
                span.innerText = "Copied!";
                span.classList.add('text-pop-pink');
                setTimeout(() => {
                    span.innerText = originalText;
                    span.classList.remove('text-pop-pink');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
                // Fallback for environments where clipboard API might fail
                window.location.href = "mailto:" + email;
            }
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); document.getElementById('mobile-menu').classList.toggle('flex'); }
        window.onload = () => { changeLang('en'); lucide.createIcons(); };
    </script>
</body>
